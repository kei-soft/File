<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블랙홀 시뮬레이션</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #101827 0%, #02040a 65%, #000 100%);
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; }
    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 310px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(5, 10, 22, 0.72);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      letter-spacing: -0.02em;
    }
    .desc {
      margin: 0 0 14px;
      font-size: 13px;
      line-height: 1.45;
      color: #cbd5e1;
    }
    .control { margin: 12px 0; }
    label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      color: #e2e8f0;
      margin-bottom: 5px;
    }
    input[type="range"] { width: 100%; }
    button {
      margin-top: 10px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 11px 12px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      box-shadow: 0 10px 28px rgba(6,182,212,0.22);
    }
    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.45;
    }
    .badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      color: #a5f3fc;
      background: rgba(8,145,178,0.15);
      border: 1px solid rgba(103,232,249,0.2);
    }
  </style>
</head>
<body>
  <canvas id="space"></canvas>

  <section class="panel">
    <div class="badge">Interactive Black Hole</div>
    <h1>블랙홀 시뮬레이션</h1>
    <p class="desc">
      입자들이 블랙홀 중력에 끌려가며 궤도를 돌고, 중심의 사건의 지평선 안으로 들어가면 흡수됩니다.
    </p>

    <div class="control">
      <label>블랙홀 질량 <span id="massText">1.8</span></label>
      <input id="mass" type="range" min="0.6" max="4" step="0.1" value="1.8" />
    </div>

    <div class="control">
      <label>입자 수 <span id="countText">900</span></label>
      <input id="count" type="range" min="200" max="2000" step="100" value="900" />
    </div>

    <div class="control">
      <label>회전 속도 <span id="spinText">1.2</span></label>
      <input id="spin" type="range" min="0" max="3" step="0.1" value="1.2" />
    </div>

    <button id="reset">입자 다시 생성</button>
    <div class="note">
      ※ 실제 일반상대성이론 계산은 아니고, 시각적으로 이해하기 쉽게 만든 뉴턴식 중력 기반 교육용 모델입니다.
    </div>
  </section>

  <script>
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');

    const massInput = document.getElementById('mass');
    const countInput = document.getElementById('count');
    const spinInput = document.getElementById('spin');
    const massText = document.getElementById('massText');
    const countText = document.getElementById('countText');
    const spinText = document.getElementById('spinText');

    let W, H, cx, cy;
    let particles = [];
    let stars = [];
    let time = 0;

    function resize() {
      W = canvas.width = window.innerWidth * devicePixelRatio;
      H = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      cx = window.innerWidth / 2;
      cy = window.innerHeight / 2;
      makeStars();
      resetParticles();
    }

    function rand(min, max) { return min + Math.random() * (max - min); }

    function makeStars() {
      stars = [];
      for (let i = 0; i < 450; i++) {
        stars.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.3,
          a: Math.random() * 0.75 + 0.15
        });
      }
    }

    function createParticle() {
      const angle = Math.random() * Math.PI * 2;
      const radius = rand(130, Math.min(window.innerWidth, window.innerHeight) * 0.62);
      const x = cx + Math.cos(angle) * radius;
      const y = cy + Math.sin(angle) * radius * 0.42;
      const tangent = angle + Math.PI / 2;
      const speed = rand(0.45, 1.6);
      return {
        x, y,
        vx: Math.cos(tangent) * speed,
        vy: Math.sin(tangent) * speed * 0.42,
        size: rand(0.7, 2.4),
        hue: rand(20, 58),
        life: rand(0.55, 1),
        trail: []
      };
    }

    function resetParticles() {
      particles = [];
      const count = Number(countInput.value);
      for (let i = 0; i < count; i++) particles.push(createParticle());
    }

    function drawStars() {
      for (const s of stars) {
        const dx = s.x - cx;
        const dy = s.y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const bend = Math.max(0, 120 / Math.max(dist, 60));
        const angle = Math.atan2(dy, dx);
        const sx = s.x + Math.cos(angle) * bend * 5;
        const sy = s.y + Math.sin(angle) * bend * 5;

        ctx.beginPath();
        ctx.fillStyle = `rgba(220,240,255,${s.a})`;
        ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBlackHole(mass) {
      const horizon = 34 + mass * 13;
      const photonRing = horizon + 22;

      const glow = ctx.createRadialGradient(cx, cy, horizon * 0.7, cx, cy, photonRing * 2.9);
      glow.addColorStop(0, 'rgba(0,0,0,1)');
      glow.addColorStop(0.32, 'rgba(0,0,0,1)');
      glow.addColorStop(0.48, 'rgba(255,170,60,0.55)');
      glow.addColorStop(0.62, 'rgba(120,70,255,0.2)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, photonRing * 3.1, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(0.25 + time * 0.00025);
      ctx.scale(1, 0.32);
      const disk = ctx.createRadialGradient(0, 0, horizon, 0, 0, 260);
      disk.addColorStop(0, 'rgba(255,255,255,0)');
      disk.addColorStop(0.2, 'rgba(255,225,150,0.95)');
      disk.addColorStop(0.42, 'rgba(255,112,40,0.6)');
      disk.addColorStop(0.78, 'rgba(130,70,255,0.16)');
      disk.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = disk;
      ctx.beginPath();
      ctx.arc(0, 0, 280, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.beginPath();
      ctx.fillStyle = '#000';
      ctx.arc(cx, cy, horizon, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,230,180,0.8)';
      ctx.lineWidth = 2;
      ctx.arc(cx, cy, horizon + 4, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = '12px system-ui';
      ctx.fillText('사건의 지평선', cx + horizon + 10, cy - 8);
    }

    function updateParticles(mass, spin) {
      const G = 0.34 * mass;
      const horizon = 34 + mass * 13;

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const dx = cx - p.x;
        const dy = cy - p.y;
        const distSq = dx * dx + dy * dy + 80;
        const dist = Math.sqrt(distSq);

        const force = G * 1800 / distSq;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;

        const swirl = spin * 0.0018 * Math.max(0, 460 - dist);
        p.vx += -dy / dist * swirl;
        p.vy += dx / dist * swirl;

        p.vx *= 0.997;
        p.vy *= 0.997;
        p.x += p.vx;
        p.y += p.vy;

        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 12) p.trail.shift();

        if (dist < horizon || p.x < -80 || p.x > window.innerWidth + 80 || p.y < -80 || p.y > window.innerHeight + 80) {
          particles[i] = createParticle();
        }
      }
    }

    function drawParticles() {
      ctx.lineCap = 'round';
      for (const p of particles) {
        for (let i = 1; i < p.trail.length; i++) {
          const a = i / p.trail.length;
          ctx.beginPath();
          ctx.strokeStyle = `hsla(${p.hue}, 100%, ${55 + a * 20}%, ${a * 0.22})`;
          ctx.lineWidth = p.size * a;
          ctx.moveTo(p.trail[i - 1].x, p.trail[i - 1].y);
          ctx.lineTo(p.trail[i].x, p.trail[i].y);
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.life})`;
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawLensGrid(mass) {
      const maxR = 360;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.strokeStyle = 'rgba(125, 211, 252, 0.07)';
      ctx.lineWidth = 1;
      for (let r = 80; r < maxR; r += 46) {
        ctx.beginPath();
        ctx.ellipse(0, 0, r + Math.sin(time * 0.001 + r) * mass * 2, r * 0.42, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function animate(t) {
      time = t;
      const mass = Number(massInput.value);
      const spin = Number(spinInput.value);

      massText.textContent = mass.toFixed(1);
      countText.textContent = countInput.value;
      spinText.textContent = spin.toFixed(1);

      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      drawStars();
      drawLensGrid(mass);
      updateParticles(mass, spin);
      drawParticles();
      drawBlackHole(mass);
      requestAnimationFrame(animate);
    }

    document.getElementById('reset').addEventListener('click', resetParticles);
    countInput.addEventListener('change', resetParticles);
    window.addEventListener('resize', resize);

    resize();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
